<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrdns Titan | Global OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="titan-theme">
    <div id="revenue-net"></div>

    <div class="os-container">
        <aside class="product-rail">
            <div class="rail-brand">A</div>
            <nav class="rail-nav">
                <div class="nav-icon active" data-target="search-section">🔍</div>
                <div class="nav-icon" data-target="social-section">👥</div>
                <div class="nav-icon" data-target="ai-section">🤖</div>
                <div class="nav-icon" data-target="game-section">🎮</div>
            </nav>
            <div class="rail-settings">⚙️</div>
        </aside>

        <main class="content-hub">
            <section id="search-section" class="active-node">
                <div class="hero-search">
                    <h1>TITAN<span>.SEARCH</span></h1>
                    <div class="omni-input-group">
                        <input type="text" id="omni-query" placeholder="Search the world, binary, or code...">
                        <button id="execute-sweep">SWEEP</button>
                    </div>
                </div>
                
                <div class="internal-ad-card" id="game-promo">
                    <div class="ad-info">
                        <span class="badge">OWNED BY US</span>
                        <h3>TITAN BREAKER: THE GAME</h3>
                        <p>Join 1M+ players in the first Abrdns internal ecosystem game.</p>
                    </div>
                    <button class="play-btn">PLAY NOW</button>
                </div>

                <div id="search-results-stream"></div>
            </section>

            </main>

        <aside class="money-rail">
            <div class="ad-unit-300">
                <span class="ad-label">NETWORK ADS</span>
                <div id="adserra-slot-1"></div>
            </div>
            
            <div class="trending-panel">
                <h4>World Pulse</h4>
                <div id="pulse-feed"></div>
            </div>
        </aside>
    </div>

    <script src="engine.js"></script>
</body>
</html>
