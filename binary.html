<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Binary Node | Abrdns OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="titan-theme">
    <div class="os-container">
        <main class="content-hub full-width">
            <h2>TITAN<span>.BINARY</span></h2>
            <p>64-bit PE Header Inspection & Malware Sandbox</p>
            
            <div class="drop-zone" id="binary-drop">
                <p>Drag & Drop .EXE or .BIN files for deep analysis</p>
            </div>

            <div class="analysis-results">
                <div class="hex-view" id="hex-output">00 4D 5A 90 00 03 00 00 ...</div>
                <div class="report-panel">
                    <h4>Architecture: x86_64</h4>
                    <h4>Entropy: 7.8 (Compressed/Encrypted)</h4>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
