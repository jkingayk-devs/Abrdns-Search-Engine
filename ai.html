<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Titan AI | Abrdns Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="titan-theme">
    <div class="os-container">
        <div class="ai-interface">
            <div class="chat-sidebar">
                <h4>Recent Conversations</h4>
                <div class="history-item">How to hack binary?</div>
                <div class="history-item">Build me a bank app</div>
            </div>
            <div class="chat-main">
                <div id="ai-response-area">
                    <div class="bot-msg">System: Abrdns Intelligence v5.0 ready. State your query.</div>
                </div>
                <div class="chat-input-bar">
                    <input type="text" id="ai-input" placeholder="Ask the Titan Brain...">
                    <button id="ai-submit">SEND</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
